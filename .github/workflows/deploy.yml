name: Deploy to GitHub Pages (hérité — Turso, ne plus utiliser)

# DÉCLENCHEMENT AUTOMATIQUE RETIRÉ VOLONTAIREMENT.
#
# Ce workflow est celui d'origine : il construit avec VITE_STATIC_DB_URL="off", c'est-à-dire
# l'application branchée sur TURSO — la base payante dont le quota est épuisé — puis la publie
# sur GitHub Pages. Tant qu'il se déclenchait sur `push: main`, le premier merge de la
# migration statique dans `main` aurait donc écrasé le site par la version à quota.
#
# Il ne peut plus partir que manuellement, et n'est conservé que comme filet de repli le temps
# que le déploiement Cloudflare soit éprouvé.
#
# Le chemin actuel est .github/workflows/build-db.yml : base SQLite statique découpée,
# déployée sur Cloudflare Pages, sans serveur de base ni facture possible.
#
# À noter : GitHub Pages plafonne à 1 Go par site, alors que la base découpée pèse ~2,1 Go —
# ce déploiement ne pourra donc JAMAIS servir l'architecture statique.

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm run build
        env:
          # Déploiement historique, conservé tel quel tant que le chemin statique n'a pas
          # été validé dans un navigateur. `off` est OBLIGATOIRE ici : sans cette valeur,
          # l'application chercherait les tranches de base sous <base>/db/, qui n'existent
          # pas sur ce déploiement — le site en ligne cesserait de fonctionner.
          # Le nouveau chemin est .github/workflows/build-db.yml (Cloudflare Pages).
          VITE_STATIC_DB_URL: "off"
          VITE_TURSO_DATABASE_URL: ${{ secrets.VITE_TURSO_DATABASE_URL }}
          VITE_TURSO_AUTH_TOKEN: ${{ secrets.VITE_TURSO_AUTH_TOKEN }}
          VITE_GA_MEASUREMENT_ID: "G-YDE0FS0VYY"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

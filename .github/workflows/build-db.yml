name: Build database

# Reconstruit la base SQLite statique depuis les fichiers ISV d'Inducks, la découpe en
# tranches déployables, et publie le tout sur Cloudflare Pages.
#
# Coût : 0 €. GitHub Actions est illimité sur dépôt public, Cloudflare Pages ne facture
# pas la bande passante et ne peut pas générer de dépassement payant.

on:
  schedule:
    # Tous les jours à 03:00 UTC — après la régénération quotidienne des ISV par Inducks.
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      source:
        description: "Source des données ISV"
        required: false
        default: "inducks"
        type: choice
        options: [inducks, mega]

env:
  # Source officielle. Bascule sur la sauvegarde MEGA tant qu'inducks.org est hors service.
  ISV_BASE: "https://inducks.org/inducks/isv"
  # 0,25 Mio = 256 Kio. Cloudflare Pages ne répond PAS 206 aux requêtes Range (limitation
  # reconnue, cloudflare/workers-sdk#3861) : il sert le fichier ENTIER. La taille de tranche
  # est donc le coût réel d'une lecture. À 20 Mio, toucher une tranche coûtait 20 Mo ; à
  # 256 Kio, une recherche lourde revient à quelques dizaines de Mo, mis en cache ensuite.
  # ~8 300 tranches, sous la limite de 20 000 fichiers par déploiement.
  CHUNK_SIZE_MIB: "1"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Déterminer la source
        id: src
        run: |
          SOURCE="${{ github.event.inputs.source || 'inducks' }}"
          echo "source=$SOURCE" >> "$GITHUB_OUTPUT"
          echo "Source retenue : $SOURCE"

      # --- Récupération des ISV -------------------------------------------------------
      - name: Télécharger les ISV depuis inducks.org
        if: steps.src.outputs.source == 'inducks'
        run: |
          mkdir -p data/isv
          python scripts/fetch_isv.py data/isv --base "$ISV_BASE"

      - name: Télécharger les ISV depuis la sauvegarde MEGA
        if: steps.src.outputs.source == 'mega'
        run: |
          pip install --quiet pycryptodome
          mkdir -p data/isv
          python scripts/fetch_isv.py data/isv --mega

      - name: Vérifier le lot récupéré
        run: |
          COUNT=$(ls data/isv/*.isv 2>/dev/null | wc -l)
          SIZE=$(du -sh data/isv | cut -f1)
          echo "$COUNT fichiers ISV, $SIZE"
          if [ "$COUNT" -lt 60 ]; then
            echo "::error::Seulement $COUNT fichiers ISV — lot incomplet, on n'écrase pas la base en ligne."
            exit 1
          fi

      # --- Construction ---------------------------------------------------------------
      - name: Construire la base SQLite
        run: python scripts/build_db.py data/isv data/inducks.sqlite

      - name: Vérifier que les requêtes réelles sont indexées
        run: python scripts/check_queries.py data/inducks.sqlite

      # Budget de requêtes HTTP par requête de l'appli. Échoue si une requête dépasse son
      # plafond — c'est-à-dire si un changement de schéma a réintroduit un parcours de
      # table. C'est le garde-fou de rapidité : sur ce backend, le nombre de requêtes est
      # la métrique qui compte.
      - name: Vérifier les budgets de performance
        run: |
          pip install --quiet apsw
          python scripts/perf_test.py data/inducks.sqlite

      # --- Construction du site -------------------------------------------------------
      # Le site est bâti AVANT le découpage : Vite recopie tout `public/` dans `dist/`,
      # donc y déposer 1,2 Go de tranches au préalable les ferait copier deux fois.
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      # PAS de `cache: pnpm` : l'action exige un pnpm-lock.yaml versionné, que ce dépôt n'a
      # pas — elle échouait donc sur « Dependencies lock file is not found », après avoir
      # pourtant construit les 2 Go de base. Le cache ne ferait gagner que quelques dizaines
      # de secondes sur un job qui en dure des milliers.
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: pnpm install
      - run: pnpm run build

      - name: Découper en tranches directement dans dist/
        run: |
          python scripts/split_db.py data/inducks.sqlite dist/db \
            --chunk-size "$CHUNK_SIZE_MIB"
          du -sh dist

      # --- Déploiement ----------------------------------------------------------------
      # Cloudflare Pages n'envoie que les fichiers dont l'empreinte a changé : une
      # reconstruction quotidienne ne re-téléverse donc pas le gigaoctet en entier.
      # `pages deploy` exige que le projet existe déjà. On le crée donc ici plutôt que de
      # demander un passage par le tableau de bord : l'étape échoue si le projet est déjà
      # là, d'où le continue-on-error, qui la rend inoffensive à chaque exécution.
      - name: Créer le projet Cloudflare Pages s'il n'existe pas
        uses: cloudflare/wrangler-action@v3
        continue-on-error: true
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages project create inducksbutbetter-demo --production-branch=main

      # Le projet s'appelle « inducksbutbetter-demo » à dessein : le sous-domaine
      # *.pages.dev est unique au monde, et `inducksbutbetter.pages.dev` est laissé
      # disponible pour le dépôt d'origine (WizyxGH).
      - name: Déployer sur Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=inducksbutbetter-demo

      - name: Résumé
        run: |
          {
            echo "### Base reconstruite"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| Source | ${{ steps.src.outputs.source }} |"
            echo "| ISV | $(du -sh data/isv | cut -f1) |"
            echo "| SQLite | $(du -sh data/inducks.sqlite | cut -f1) |"
            echo "| Tranches | $(ls dist/db/db-*.bin | wc -l) |"
          } >> "$GITHUB_STEP_SUMMARY"
